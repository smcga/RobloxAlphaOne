name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Aftman
        uses: ok-nick/setup-aftman@v0.4.2

      - name: Install toolchain
        run: aftman install

      - name: Install Wally dependencies
        run: wally install

      - name: Check formatting
        run: stylua --check .

      - name: Lint
        run: selene src tests

      - name: Run unit tests
        run: lune run tests/run_tests.luau

      - name: Validate Rojo build
        run: rojo build default.project.json --output build.rbxlx
