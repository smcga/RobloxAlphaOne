name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Trust mise config
        run: mise trust

      - name: Install toolchain
        run: mise install

      - name: Install Wally dependencies
        run: mise exec -- wally install

      - name: Check formatting
        run: mise exec -- stylua --check .

      - name: Lint
        run: mise exec -- selene src tests

      - name: Run unit tests
        run: mise exec -- lune run tests/run_tests.luau

      - name: Validate Rojo build
        run: mise exec -- rojo build default.project.json --output build.rbxlx
